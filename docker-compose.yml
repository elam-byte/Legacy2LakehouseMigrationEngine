version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Legacy-to-Lakehouse Migration Engine
#
# Services:
#   1. postgres   — Legacy source database (PostgreSQL 15)
#   2. minio      — S3-compatible object storage (lakehouse storage layer)
#   3. mc         — MinIO client (one-shot: creates warehouse bucket)
#   4. nessie     — Git-like Iceberg catalog (replaces Hive Metastore)
#   5. trino      — Federated SQL engine (reads PG + writes Iceberg)
#   6. prometheus — Metrics collection (Trino JMX + MinIO)
#   7. grafana    — FinOps dashboard
# ─────────────────────────────────────────────────────────────────────────────

networks:
  lakehouse:
    driver: bridge

volumes:
  postgres-data:
  minio-data:
  prometheus-data:
  grafana-data:

services:

  # ── 1. Legacy Source ────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: legacy-postgres
    networks: [lakehouse]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: legacydb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./sql/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d legacydb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── 2. Object Storage ───────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: minio
    networks: [lakehouse]
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s

  # ── 3. MinIO Init (one-shot) ────────────────────────────────────────────────
  mc:
    image: minio/mc:latest
    container_name: minio-init
    networks: [lakehouse]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/warehouse &&
        mc anonymous set public local/warehouse &&
        echo 'MinIO bucket warehouse ready.';
        exit 0
      "
    restart: "no"

  # ── 4. Iceberg Catalog (Nessie) ─────────────────────────────────────────────
  nessie:
    image: ghcr.io/projectnessie/nessie:latest
    container_name: nessie
    networks: [lakehouse]
    ports:
      - "19120:19120"
    environment:
      QUARKUS_HTTP_PORT: "19120"
      # Use in-memory version store for local dev (switch to JDBC for production)
      NESSIE_VERSION_STORE_TYPE: IN_MEMORY
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:19120/api/v2/config"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── 5. Query Engine (Trino) ─────────────────────────────────────────────────
  trino:
    image: trinodb/trino:480
    container_name: trino
    networks: [lakehouse]
    ports:
      - "8080:8080"   # Trino Web UI + API
      - "12345:12345" # Prometheus JMX metrics exporter
    volumes:
      - ./config/trino/catalog:/etc/trino/catalog:ro
      - ./config/trino/config.properties:/etc/trino/config.properties:ro
      - ./config/trino/jvm.config:/etc/trino/jvm.config:ro
    depends_on:
      postgres:
        condition: service_healthy
      nessie:
        condition: service_healthy
      mc:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/info"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── 6. Metrics Collection (Prometheus) ─────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: prometheus
    networks: [lakehouse]
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    depends_on:
      - trino
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── 7. FinOps Dashboard (Grafana) ───────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.2.0
    container_name: grafana
    networks: [lakehouse]
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
